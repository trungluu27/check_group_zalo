name: Build macOS App

on:
  push:
    tags:
      - 'v*'           # Trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

jobs:
  build-macos:
    name: Build macOS .app (Apple Silicon)
    runs-on: macos-14    # macos-14 = Apple Silicon runner (arm64)

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout source code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Setup Python (arm64 to match macos-14 runner)
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      # 3. Cache pip packages
      # -----------------------------------------------------------------------
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # -----------------------------------------------------------------------
      # 4. Install Python dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # -----------------------------------------------------------------------
      # 5. Download ChromeDriver matching the runner's Chrome version
      # -----------------------------------------------------------------------
      - name: Download ChromeDriver for bundling
        run: python resources/download_chromedriver.py

      # -----------------------------------------------------------------------
      # 6. Build macOS .app bundle
      # -----------------------------------------------------------------------
      - name: Build macOS .app
        run: pyinstaller ZaloGroupChecker.spec --noconfirm

      # -----------------------------------------------------------------------
      # 7. Verify Qt plugins, qt.conf, and bundle structure
      #    (This is the critical check — catches the 3 crash-on-launch causes:
      #      - missing platforms/libqcocoa.dylib
      #      - missing qt.conf
      #      - malformed .app bundle)
      # -----------------------------------------------------------------------
      - name: Verify build output
        run: |
          APP="dist/ZaloGroupChecker.app"

          if [ ! -d "$APP" ]; then
            echo "❌ Build failed — $APP not found"
            exit 1
          fi
          echo "✅ $APP created"
          du -sh "$APP"

          echo ""
          echo "--- Checking Qt platform plugin (libqcocoa.dylib) ---"
          if find "$APP" -name 'libqcocoa.dylib' | grep -q .; then
            find "$APP" -name 'libqcocoa.dylib'
            echo "✅ Qt cocoa platform plugin present"
          else
            echo "❌ libqcocoa.dylib NOT FOUND — app will crash at launch"
            exit 1
          fi

          echo ""
          echo "--- Checking qt.conf ---"
          if find "$APP" -name 'qt.conf' | grep -q .; then
            find "$APP" -name 'qt.conf' -exec echo "{}" \; -exec cat {} \;
            echo "✅ qt.conf present"
          else
            echo "⚠️  qt.conf not found (Qt may auto-detect, but recommended to have)"
          fi

          echo ""
          echo "--- Checking bundle structure ---"
          test -f "$APP/Contents/Info.plist" && echo "✅ Info.plist" || { echo "❌ Info.plist missing"; exit 1; }
          test -f "$APP/Contents/MacOS/ZaloGroupChecker" && echo "✅ main executable" || { echo "❌ main executable missing"; exit 1; }
          test -d "$APP/Contents/Resources" && echo "✅ Resources/" || { echo "❌ Resources/ missing"; exit 1; }

      # -----------------------------------------------------------------------
      # 8. Post-process: strip quarantine, fix perms, ad-hoc codesign
      #    This prevents "app is damaged" / Gatekeeper errors on first launch.
      # -----------------------------------------------------------------------
      - name: Strip quarantine and set executable permissions
        run: |
          APP="dist/ZaloGroupChecker.app"
          # Remove any extended attributes (quarantine, etc.)
          xattr -cr "$APP"
          # Main executable
          chmod +x "$APP/Contents/MacOS/ZaloGroupChecker"
          # Any bundled chromedriver binaries
          find "$APP" -type f -name 'chromedriver*' -exec chmod +x {} \; || true
          echo "✅ Quarantine stripped, executables marked +x"

      - name: Ad-hoc codesign the .app
        run: |
          APP="dist/ZaloGroupChecker.app"
          # Ad-hoc sign (identity = "-") with entitlements so Gatekeeper allows launch.
          # Real distribution requires a Developer ID; ad-hoc is enough for
          # right-click → Open bypass.
          codesign --force --deep --options runtime \
                   --entitlements resources/entitlements.plist \
                   --sign - "$APP"
          echo ""
          echo "--- Verifying signature ---"
          codesign --verify --deep --strict --verbose=2 "$APP" || true
          spctl --assess --type execute --verbose=2 "$APP" || true

      # -----------------------------------------------------------------------
      # 9. Create ZIP archive (ditto preserves xattrs/signing correctly)
      # -----------------------------------------------------------------------
      - name: Create ZIP archive
        run: |
          cd dist
          # Use ditto instead of zip — preserves code signature & resource forks
          ditto -c -k --sequesterRsrc --keepParent ZaloGroupChecker.app ZaloGroupChecker-macOS.zip
          ls -lh ZaloGroupChecker-macOS.zip

      # -----------------------------------------------------------------------
      # 10. Upload artifact (available for 14 days in GitHub Actions UI)
      # -----------------------------------------------------------------------
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZaloGroupChecker-macOS
          path: dist/ZaloGroupChecker-macOS.zip
          retention-days: 14

      # -----------------------------------------------------------------------
      # 11. Create GitHub Release (only on version tags)
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ZaloGroupChecker-macOS.zip
          name: "Zalo Group Checker ${{ github.ref_name }}"
          body: |
            ## Zalo Group Checker ${{ github.ref_name }}

            ### macOS Installation
            1. Download `ZaloGroupChecker-macOS.zip`
            2. Unzip and drag `ZaloGroupChecker.app` to your Applications folder
            3. First launch: **Right-click → Open** (to bypass Gatekeeper)
            4. If macOS still blocks: run in Terminal once:
               ```
               xattr -cr /Applications/ZaloGroupChecker.app
               ```
            5. Make sure **Google Chrome** is installed on your Mac
               → Download: https://www.google.com/chrome/

            ### Requirements
            - macOS 11.0 (Big Sur) or later
            - **Apple Silicon (M1/M2/M3/M4)** — this build is arm64 only
            - Google Chrome browser installed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
