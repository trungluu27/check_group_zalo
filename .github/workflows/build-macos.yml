name: Build macOS App

on:
  push:
    tags:
      - 'v*'           # Trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:   # Allow manual trigger from GitHub Actions UI

jobs:
  build-macos:
    name: Build macOS .app (arm64)
    runs-on: macos-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout source code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Setup Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
  
      # -----------------------------------------------------------------------
      # 3. Cache pip packages
      # -----------------------------------------------------------------------
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # -----------------------------------------------------------------------
      # 4. Install Python dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # -----------------------------------------------------------------------
      # Install Google Chrome        <-- THÊM VÀO ĐÂY
      # -----------------------------------------------------------------------
      - name: Install Google Chrome
        run: |
          brew install --cask google-chrome

      # -----------------------------------------------------------------------
      # 5. Download ChromeDriver matching the runner's Chrome version
      # -----------------------------------------------------------------------
      - name: Download ChromeDriver for bundling
        run: python resources/download_chromedriver.py

      # -----------------------------------------------------------------------
      # 6. Build macOS .app bundle
      # -----------------------------------------------------------------------
      - name: Build macOS .app
        run: pyinstaller ZaloGroupChecker.spec --noconfirm

      # -----------------------------------------------------------------------
      # 7. Remove problematic Qt location/positioning permission plugins
      # (prevents startup crash on some macOS 15 ARM systems)
      # -----------------------------------------------------------------------
      - name: Remove problematic Qt permission/location plugins
        run: |
          APP="dist/ZaloGroupChecker.app"

          # PyQt6 Qt plugin locations in PyInstaller bundles (vary by version/layout)
          PLUGIN_DIRS=(
            "$APP/Contents/Frameworks/PyQt6/Qt6/plugins"
            "$APP/Contents/MacOS/PyQt6/Qt6/plugins"
            "$APP/Contents/Resources/PyQt6/Qt6/plugins"
          )

          for DIR in "${PLUGIN_DIRS[@]}"; do
            if [ -d "$DIR" ]; then
              echo "[INFO] Scanning $DIR"

              # Remove permissions plugins related to location services
              if [ -d "$DIR/permissions" ]; then
                find "$DIR/permissions" -type f \( -iname "*location*" -o -iname "*position*" \) -print -delete || true
              fi

              # Remove Qt location/positioning plugin trees if present
              rm -rf "$DIR/geoservices" "$DIR/position" "$DIR/positioning" "$DIR/location" || true
            fi
          done

      # -----------------------------------------------------------------------
      # 8. Ad-hoc codesign the app
      # -----------------------------------------------------------------------
      - name: Ad-hoc codesign the app
        run: |
          codesign --force --deep --sign - \
            --entitlements resources/entitlements.plist \
            dist/ZaloGroupChecker.app

      # -----------------------------------------------------------------------
      # 9. Verify build output
      # -----------------------------------------------------------------------
      - name: Verify build
        run: |
          if [ -d "dist/ZaloGroupChecker.app" ]; then
            echo "✅ ZaloGroupChecker.app created successfully"
            du -sh dist/ZaloGroupChecker.app
          else
            echo "❌ Build failed — ZaloGroupChecker.app not found"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 10. Create ZIP archive
      # -----------------------------------------------------------------------
      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ZaloGroupChecker-macOS.zip ZaloGroupChecker.app
          ls -lh ZaloGroupChecker-macOS.zip

      # -----------------------------------------------------------------------
      # 11. Upload artifact (available for 14 days in GitHub Actions UI)
      # -----------------------------------------------------------------------
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZaloGroupChecker-macOS
          path: dist/ZaloGroupChecker-macOS.zip
          retention-days: 14

      # -----------------------------------------------------------------------
      # 12. Create GitHub Release (only on version tags)
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ZaloGroupChecker-macOS.zip
          name: "Zalo Group Checker ${{ github.ref_name }}"
          body: |
            ## Zalo Group Checker ${{ github.ref_name }}

            ### macOS Installation
            1. Download `ZaloGroupChecker-macOS.zip`
            2. Unzip and drag `ZaloGroupChecker.app` to your Applications folder
            3. First launch: **Right-click → Open** (to bypass Gatekeeper)
            4. Make sure **Google Chrome** is installed on your Mac
               → Download: https://www.google.com/chrome/

            ### Requirements
            - macOS 11.0 (Big Sur) or later
            - Apple Silicon (arm64) macOS build
            - Google Chrome browser installed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
